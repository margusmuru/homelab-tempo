cache:  
  caches:
    - roles:
      - frontend-search  
      memcached: 
        addresses: dns+memcached:11211

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09
    metadata_slo:
        duration_slo: 5s
        throughput_bytes_slo: 1.073741824e+09
  trace_by_id:
    duration_slo: 100ms
  metrics:
    max_duration: 120h                # maximum duration of a metrics query, increase for local setups
    query_backend_after: 5m
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09

server:
  grpc_server_max_recv_msg_size: 67108864  # 64MB
  grpc_server_max_send_msg_size: 67108864  # 64MB
ingester_client:
   grpc_client_config:
     max_recv_msg_size: 209715200  # 200MB
     max_send_msg_size: 209715200  # 200MB
querier:
  frontend_worker:
    grpc_client_config:
      max_recv_msg_size: 209715200  # 200MB
      max_send_msg_size: 67108864  # 64MB

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "tempo:4317"
        http:
          endpoint: "tempo:4318"
    opencensus:
      endpoint: "tempo:55678"

ingester:
  flush_check_period: 120s
  trace_idle_period: 120s
  max_block_duration: 30m
  complete_block_timeout: 15m
  flush_all_on_shutdown: true

compactor:
  compaction:
    block_retention: 336h                # overall Tempo trace retention. set for demo purposes

storage:
  trace:
    backend: local                     # backend configuration to use
    wal:
      path: /var/tempo/wal             # where to store the wal locally
    local:
      path: /var/tempo/blocks

metrics_generator:
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  registry:
    # A list of labels that will be added to all generated metrics.
    external_labels:
      source: tempo
  processor:
    service_graphs:
      wait: 30s
      max_items: 10000
      workers: 10
      dimensions: []
      #enable_client_server_prefix: false
      peer_attributes:
        - peer.service
        - db.name
        - db.system
        - messaging.destination.name
      # Enables additional labels for services and virtual nodes. Default false
      enable_virtual_node_label: true
      # If enabled another histogram will be produced for interactions over messaging systems middlewares
      # If this feature is relevant over long time ranges (high latencies) - consider increasing
      # `wait` value for this processor. Default false
      # enable_messaging_system_latency_histogram: false
      enable_messaging_system_latency_histogram: true

    span_metrics:
      enable_target_info: true
    local_blocks:
      filter_server_spans: false
      flush_to_storage: true
  traces_storage:
    path: /tmp/tempo/generator/traces

overrides:
  defaults:
    global:
      max_bytes_per_trace: 50000000