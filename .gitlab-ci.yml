stages:
  - test
  - deploy

include:
# tempo — memcached + tempo on dev-2; bind-mounted config/ ships via deploy-compose
# (retired the separate config-dir-copy job); grafana network
  - component: $CI_SERVER_FQDN/components/docker/validate-compose@~latest
    inputs:
      as: "lint-tempo"
      local_path: "deployments/tempo"
  - component: $CI_SERVER_FQDN/components/docker/deploy-compose@~latest
    inputs:
      as: "deploy-tempo"
      environment: "dev-2"                            # host derives to dev-2-vm.margusm.dev
      local_path: "deployments/tempo"
      remote_path: "deployments/tempo-dev-2-vm-1"     # unchanged host dir → in-place update
